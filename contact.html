<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Lumothrive</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <div class="transition-screen" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html"><img src="assets/Lumothrive%20Logo.PNG" alt="" /><span>Lumothrive</span></a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav"><span></span><span></span></button>
        <nav class="site-nav" id="site-nav">
          <a href="work.html">Work</a><a href="culture.html">Culture</a><a href="join.html">Careers</a><a href="contact.html">Contact</a>
        </nav>
        <a class="nav-cta" href="contact.html">Let's Talk</a>
      </header>
      <main>
        <section class="page-hero light">
          <div class="reveal">
            <p class="eyebrow">Contact</p>
            <h1>Tell us what you're building. We'll shape how it shows up.</h1>
          </div>
        </section>
        <section class="section section-light no-pad-top">
          <div class="contact-grid">
            <form class="contact-form reveal">
              <label>Name<input type="text" name="name" placeholder="Your name" /></label>
              <label>Brand<input type="text" name="brand" placeholder="Company / creator name" /></label>
              <label>Project Type<select name="project"><option>Commercial campaign</option><option>Social media content</option><option>Brand storytelling</option><option>Event coverage</option><option>Motion graphics</option></select></label>
              <label>Project Notes<textarea name="notes" rows="5" placeholder="Tell us what you need"></textarea></label>
              <button class="button button-dark magnetic" type="submit">Send Inquiry</button>
            </form>
            <div class="contact-panel reveal">
              <h2>Direct Links</h2>
              <a href="https://wa.me/917338989888">WhatsApp</a>
              <a href="https://www.instagram.com/lumothrive/">Instagram</a>
              <a href="#" aria-disabled="true">Book a Call: placeholder</a>
              <p>For now, the form is a visual placeholder. WhatsApp and Instagram are ready.</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
